<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA Lda — Painel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">IMA</div>
      <div>
        <div class="sidebar-title">IMA Lda</div>
        <div class="sidebar-sub" id="user-role-label">A carregar...</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" onclick="showSection('tickets')">
        <span class="nav-icon">◈</span> Problemas
        <span class="nav-badge" id="badge-abertos"></span>
      </a>
      <a href="#" class="nav-item" onclick="showSection('mensagens')">
        <span class="nav-icon">◉</span> Mensagens
      </a>
      <a href="#" class="nav-item" onclick="showSection('equipa')" id="nav-equipa">
        <span class="nav-icon">◎</span> Equipa
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="user-avatar">--</div>
        <div>
          <div class="user-name" id="user-name">...</div>
          <div class="user-cargo" id="user-cargo">...</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()" title="Sair">⏻</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">

    <!-- TICKETS -->
    <section id="section-tickets" class="section active">
      <div class="section-header">
        <div>
          <h1>Problemas</h1>
          <p class="section-desc">Regista e acompanha todos os problemas da empresa</p>
        </div>
        <button class="btn-primary" onclick="openModalNovo()">+ Novo problema</button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="filters-bar">
        <div class="filters" id="filters"></div>
        <input type="text" class="search-input" id="search-input" placeholder="Pesquisar..." oninput="renderTickets()">
      </div>

      <div id="tickets-list"></div>
    </section>

    <!-- MENSAGENS -->
    <section id="section-mensagens" class="section">
      <div class="section-header">
        <div>
          <h1>Canal da equipa</h1>
          <p class="section-desc">Comunicação geral da IMA Lda</p>
        </div>
      </div>
      <div class="chat-container">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" class="form-input" id="chat-input" placeholder="Escrever mensagem..." onkeydown="if(event.key==='Enter')enviarMsgGeral()">
          <button class="btn-primary" onclick="enviarMsgGeral()">Enviar</button>
        </div>
      </div>
    </section>

    <!-- EQUIPA -->
    <section id="section-equipa" class="section">
      <div class="section-header">
        <div>
          <h1>Equipa</h1>
          <p class="section-desc">Visão geral dos colaboradores e problemas atribuídos</p>
        </div>
      </div>
      <div id="equipa-grid"></div>
    </section>

  </main>
</div>

<!-- MODAL NOVO TICKET -->
<div class="modal-overlay" id="modal-novo" style="display:none" onclick="closeModalNovo(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>Registar novo problema</h2>
      <button class="modal-close" onclick="closeModalNovoBtn()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Título do problema *</label>
        <input type="text" class="form-input" id="novo-titulo" placeholder="Descreva brevemente o problema">
      </div>
      <div class="form-group">
        <label class="form-label">Descrição detalhada</label>
        <textarea class="form-textarea" id="novo-desc" placeholder="O que aconteceu? Quando? Onde? Qual o impacto?"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select class="form-select" id="novo-categoria">
            <option value="Manutenção">Manutenção</option>
            <option value="Comercial">Comercial</option>
            <option value="Administrativo">Administrativo</option>
            <option value="Logística">Logística</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Prioridade</label>
          <select class="form-select" id="novo-prioridade">
            <option value="baixo">Baixo</option>
            <option value="medio" selected>Médio</option>
            <option value="alto">Alto</option>
            <option value="urgente">Urgente</option>
          </select>
        </div>
      </div>
      <div class="form-group" id="campo-responsavel">
        <label class="form-label">Responsável</label>
        <select class="form-select" id="novo-responsavel"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModalNovoBtn()">Cancelar</button>
      <button class="btn-primary" onclick="criarTicket()">Registar problema</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE TICKET -->
<div class="modal-overlay" id="modal-detalhe" style="display:none" onclick="closeModalDetalhe(event)">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="detalhe-titulo">-</h2>
      <button class="modal-close" onclick="closeModalDetalheBtn()">×</button>
    </div>
    <div class="modal-body" id="detalhe-body"></div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
</body>
</html>
