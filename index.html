<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA Lda — Gestão de Problemas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0C447C 0%,#185FA5 50%,#378ADD 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.logo-mark{width:48px;height:48px;background:linear-gradient(135deg,#185FA5,#378ADD);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px;letter-spacing:.5px;flex-shrink:0}
.brand-name{font-size:20px;font-weight:800;color:#0f172a}
.brand-sub{font-size:12px;color:#64748b;margin-top:1px}
.fg{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#0f172a;background:#fff;transition:all .15s;font-family:inherit}
input:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.12)}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#185FA5,#378ADD);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .15s}
.btn:hover{opacity:.9}
.link-row{text-align:center;margin-top:16px;font-size:13px;color:#64748b}
.link-row a{color:#185FA5;text-decoration:none;font-weight:600}
.alert{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.alert-err{background:#fef2f2;color:#991b1b;border:1.5px solid #fecaca}
.alert-ok{background:#f0fdf4;color:#166534;border:1.5px solid #bbf7d0}
#form-reg{display:none}
.divider{text-align:center;color:#94a3b8;font-size:12px;margin:4px 0 16px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#e2e8f0}
.divider::before{left:0}.divider::after{right:0}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-mark">IMA</div>
    <div>
      <div class="brand-name">IMA Lda</div>
      <div class="brand-sub">Gestão de Problemas e Tarefas</div>
    </div>
  </div>
  <div class="alert alert-err" id="err"></div>
  <div class="alert alert-ok" id="ok"></div>
  <div id="form-login">
    <div class="fg"><label>Email</label><input type="email" id="l-email" placeholder="o.teu@ima.co.ao" autocomplete="email"></div>
    <div class="fg"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn" onclick="login()">Entrar</button>
    <div class="link-row">Primeiro acesso? <a href="#" onclick="showReg()">Criar conta</a></div>
  </div>
  <div id="form-reg">
    <div class="fg"><label>Nome completo</label><input type="text" id="r-nome" placeholder="O teu nome"></div>
    <div class="fg"><label>Email</label><input type="email" id="r-email" placeholder="o.teu@ima.co.ao"></div>
    <div class="fg"><label>Password</label><input type="password" id="r-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')register()"></div>
    <button class="btn" onclick="register()">Criar conta</button>
    <div class="link-row">Já tens conta? <a href="#" onclick="showLogin()">Entrar</a></div>
  </div>
</div>
<script>
const SB=supabase.createClient('https://wvmprizthrcxmvkkoiyu.supabase.co','sb_publishable_9VegElC1LK6TxZzhXRrfIA_3vFkTVrj');
(async()=>{const{data:{session}}=await SB.auth.getSession();if(session)location.href='app.html';})();
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';document.getElementById('ok').style.display='none'}
function showOk(m){const e=document.getElementById('ok');e.textContent=m;e.style.display='block';document.getElementById('err').style.display='none'}
function showReg(){document.getElementById('form-login').style.display='none';document.getElementById('form-reg').style.display='block';document.getElementById('err').style.display='none'}
function showLogin(){document.getElementById('form-reg').style.display='none';document.getElementById('form-login').style.display='block';document.getElementById('err').style.display='none'}
async function login(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass)return showErr('Preenche email e password.');
  const{error}=await SB.auth.signInWithPassword({email,password:pass});
  if(error)return showErr('Email ou password incorretos.');
  location.href='app.html';
}
async function register(){
  const nome=document.getElementById('r-nome').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  if(!nome||!email||!pass)return showErr('Preenche todos os campos.');
  if(pass.length<6)return showErr('Password com mínimo 6 caracteres.');
  const role=email.toLowerCase()==='marcio@ima.co.ao'?'gestor':'colaborador';
  const{error}=await SB.auth.signUp({email,password:pass,options:{data:{nome,role}}});
  if(error)return showErr(error.message);
  showOk('Conta criada! Podes entrar agora.');
}
</script>
</body>
</html>
