<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA Lda — Gestão de Problemas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">IMA</div>
      <div>
        <div class="auth-title">IMA Lda</div>
        <div class="auth-sub">Gestão de Problemas</div>
      </div>
    </div>

    <div id="auth-error" class="alert alert-danger" style="display:none"></div>
    <div id="auth-success" class="alert alert-success" style="display:none"></div>

    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="o.teu@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••">
      </div>
      <button class="btn-primary btn-full" onclick="login()">Entrar</button>
      <p class="auth-link">Primeiro acesso? <a href="#" onclick="showRegister()">Criar conta</a></p>
    </div>

    <div id="form-register" style="display:none">
      <div class="form-group">
        <label class="form-label">Nome completo</label>
        <input type="text" id="reg-nome" class="form-input" placeholder="O teu nome">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="reg-email" class="form-input" placeholder="o.teu@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="reg-password" class="form-input" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn-primary btn-full" onclick="register()">Criar conta</button>
      <p class="auth-link">Já tens conta? <a href="#" onclick="showLogin()">Entrar</a></p>
    </div>
  </div>
</div>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
