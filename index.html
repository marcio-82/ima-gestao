<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA Lda — Gestão de Problemas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;--border:#e2e8f0;--bg:#f8fafc;--text:#0f172a;--text2:#64748b;--radius:10px;--radius-lg:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:400px}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-mark{width:40px;height:40px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;letter-spacing:.5px;flex-shrink:0}
.brand-name{font-size:18px;font-weight:700;color:var(--text)}
.brand-sub{font-size:12px;color:var(--text2)}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
input{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:#fff;transition:border-color .15s;font-family:inherit}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s}
.btn:hover{background:var(--blue-dark)}
.link-row{text-align:center;margin-top:14px;font-size:13px;color:var(--text2)}
.link-row a{color:var(--blue);text-decoration:none;font-weight:500}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:none}
.alert-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.alert-ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
#form-reg{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-mark">IMA</div>
    <div>
      <div class="brand-name">IMA Lda</div>
      <div class="brand-sub">Gestão de Problemas</div>
    </div>
  </div>

  <div class="alert alert-err" id="err"></div>
  <div class="alert alert-ok" id="ok"></div>

  <div id="form-login">
    <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="o.teu@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn" onclick="login()">Entrar</button>
    <div class="link-row">Primeiro acesso? <a href="#" onclick="showReg()">Criar conta</a></div>
  </div>

  <div id="form-reg">
    <div class="form-group"><label>Nome</label><input type="text" id="r-nome" placeholder="O teu nome completo"></div>
    <div class="form-group"><label>Email</label><input type="email" id="r-email" placeholder="o.teu@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="r-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')register()"></div>
    <button class="btn" onclick="register()">Criar conta</button>
    <div class="link-row">Já tens conta? <a href="#" onclick="showLogin()">Entrar</a></div>
  </div>
</div>

<script>
const SB_URL='https://wvmprizthrcxmvkkoiyu.supabase.co';
const SB_KEY='sb_publishable_9VegElC1LK6TxZzhXRrfIA_3vFkTVrj';
const _sb=supabase.createClient(SB_URL,SB_KEY);

(async()=>{const{data:{session}}=await _sb.auth.getSession();if(session)location.href='app.html';})();

function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';document.getElementById('ok').style.display='none'}
function showOk(m){const e=document.getElementById('ok');e.textContent=m;e.style.display='block';document.getElementById('err').style.display='none'}
function showReg(){document.getElementById('form-login').style.display='none';document.getElementById('form-reg').style.display='block';document.getElementById('err').style.display='none'}
function showLogin(){document.getElementById('form-reg').style.display='none';document.getElementById('form-login').style.display='block';document.getElementById('err').style.display='none'}

async function login(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass)return showErr('Preenche email e password.');
  const{error}=await _sb.auth.signInWithPassword({email,password:pass});
  if(error)return showErr('Email ou password incorretos.');
  location.href='app.html';
}

async function register(){
  const nome=document.getElementById('r-nome').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  if(!nome||!email||!pass)return showErr('Preenche todos os campos.');
  if(pass.length<6)return showErr('Password deve ter pelo menos 6 caracteres.');
  const role=email.toLowerCase()==='marcio@ima.co.ao'?'gestor':'colaborador';
  const{error}=await _sb.auth.signUp({email,password:pass,options:{data:{nome,role}}});
  if(error)return showErr(error.message);
  showOk('Conta criada! Podes entrar agora.');
}
</script>
</body>
</html>
